<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FFF9F0"/>

  <!-- Border brutal -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="#1E1B2E" stroke-width="5"/>

  <!-- Accent bar top -->
  <rect x="20" y="20" width="1160" height="12" rx="8" fill="#FF6B35"/>

  <!-- Git graph decoration -->
  <circle cx="120" cy="200" r="22" fill="#FFD93D" stroke="#1E1B2E" stroke-width="3"/>
  <circle cx="120" cy="310" r="22" fill="#FF6B9D" stroke="#1E1B2E" stroke-width="3"/>
  <circle cx="120" cy="420" r="22" fill="#3B82F6" stroke="#1E1B2E" stroke-width="3"/>
  <circle cx="220" cy="255" r="22" fill="#A855F7" stroke="#1E1B2E" stroke-width="3"/>
  <line x1="120" y1="222" x2="120" y2="288" stroke="#1E1B2E" stroke-width="3"/>
  <line x1="120" y1="332" x2="120" y2="398" stroke="#1E1B2E" stroke-width="3"/>
  <line x1="140" y1="215" x2="200" y2="248" stroke="#1E1B2E" stroke-width="3"/>
  <line x1="200" y1="265" x2="140" y2="298" stroke="#1E1B2E" stroke-width="3"/>

  <!-- Main text -->
  <text x="320" y="250" font-family="Georgia, serif" font-size="82" font-weight="bold" fill="#1E1B2E">Git Simulator</text>
  <text x="320" y="330" font-family="Georgia, serif" font-size="38" fill="#FF6B35" font-weight="bold">Belajar Git Itu Seru!</text>
  <text x="322" y="400" font-family="Georgia, serif" font-size="28" fill="#1E1B2E" opacity="0.65">Media pembelajaran interaktif Version Control Git</text>
  <text x="322" y="440" font-family="Georgia, serif" font-size="28" fill="#1E1B2E" opacity="0.65">untuk siswa SMA/SMK — Bahasa Indonesia</text>

  <!-- Tag chips -->
  <rect x="322" y="480" width="140" height="40" rx="8" fill="#FFD93D" stroke="#1E1B2E" stroke-width="2.5"/>
  <text x="392" y="506" font-family="Georgia, serif" font-size="20" fill="#1E1B2E" text-anchor="middle" font-weight="bold">9 Modul</text>

  <rect x="480" y="480" width="160" height="40" rx="8" fill="#FF6B9D" stroke="#1E1B2E" stroke-width="2.5"/>
  <text x="560" y="506" font-family="Georgia, serif" font-size="20" fill="#1E1B2E" text-anchor="middle" font-weight="bold">Animasi SVG</text>

  <rect x="658" y="480" width="160" height="40" rx="8" fill="#3B82F6" stroke="#1E1B2E" stroke-width="2.5"/>
  <text x="738" y="506" font-family="Georgia, serif" font-size="20" fill="white" text-anchor="middle" font-weight="bold">Kuis Interaktif</text>

  <!-- URL -->
  <text x="600" y="590" font-family="Georgia, serif" font-size="22" fill="#1E1B2E" opacity="0.45" text-anchor="middle">gitsim.syzzhd.web.id</text>
</svg>
